# Settings used by Streamlit Community Cloud and local `streamlit run app.py`.
[server]
headless = true
maxUploadSize = 50

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#2dd4bf"
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#172033"
textColor = "#f8fafc"
font = "sans serif"
